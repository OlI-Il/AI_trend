name: Daily AI Trends

on:
  schedule:
    # 9 AM Melbourne time (AEDT, UTC+11). Drifts 1 hour to 10 AM in AEST (UTC+10) winter.
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  contents: write
  id-token: write

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build YouTube MCP server
        run: cd mcp/youtube && npm ci && npm run build

      - name: Create MCP config
        run: |
          if [ -z "${YOUTUBE_API_KEY}" ]; then
            echo "::error::YOUTUBE_API_KEY is empty or missing. Set it in repo secrets."
            exit 1
          fi

          cat > /tmp/mcp-config.json << EOF
          {
            "mcpServers": {
              "youtube": {
                "command": "node",
                "args": ["${{ github.workspace }}/mcp/youtube/dist/index.js"],
                "env": {
                  "YOUTUBE_API_KEY": "${YOUTUBE_API_KEY}"
                }
              },
              "notion": {
                "command": "npx",
                "args": ["-y", "@notionhq/notion-mcp-server"],
                "env": {
                  "NOTION_TOKEN": "${NOTION_TOKEN}"
                }
              }
            }
          }
          EOF

      - name: Debug MCP setup
        run: |
          echo "=== Workspace ==="
          ls -la ${{ github.workspace }}/mcp/youtube/dist/
          echo "=== YOUTUBE_API_KEY present ==="
          if [ -n "${YOUTUBE_API_KEY}" ]; then echo "yes"; else echo "no"; fi
          echo "=== NOTION_TOKEN present ==="
          if [ -n "${NOTION_TOKEN}" ]; then echo "yes"; else echo "no"; fi
          echo "=== MCP config ==="
          cat /tmp/mcp-config.json
          echo "=== .mcp.json ==="
          cat ${{ github.workspace }}/.mcp.json
          echo "=== Test MCP server starts ==="
          timeout 5 node ${{ github.workspace }}/mcp/youtube/dist/index.js || true

      - name: Get today's date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch AI trends with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Write,Bash(python*),mcp__youtube__*,mcp__notion__*"
            --mcp-config /tmp/mcp-config.json
          show_full_output: "true"
          prompt: |
            IMPORTANT: Do NOT create any Python scripts or code files. Do NOT write to any .py files.
            Only use MCP tools and the Write tool to create the final markdown report.

            Today's date is ${{ steps.date.outputs.today }}.

            Use the youtube MCP tools (mcp__youtube__youtube_search_videos, mcp__youtube__youtube_get_video)
            to search for the top 10 trending AI videos from the last 24 hours. Search for:
            "artificial intelligence", "LLM", "AI agents", "generative AI".
            For each video collect title, channel, views, URL.
            Write the markdown report directly to output/${{ steps.date.outputs.today }}-trends.md with a table
            of results and a highlights section. Use the Write tool to create the report file — do not use
            Bash or Python to write it.

            After saving the report file, also create a Notion page:
            - Use mcp__notion__create_page to create a new page under parent page ID "${{ env.NOTION_PARENT_PAGE_ID }}"
            - Title the page "AI Trends — ${{ steps.date.outputs.today }}"
            - Include the full report content as the page body in markdown
            - If Notion creation fails (e.g. missing token or page ID), log a warning but do not fail the workflow
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Publish report to Actions summary
        run: |
          if ls output/*.md 2>/dev/null; then
            cat output/*.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit trend report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add output/
          git diff --staged --quiet || git commit -m "Add daily AI trends report for $(date +%Y-%m-%d)"
          git push
